<h1>支持与帮助</h1>

<h2>常见问题</h2>

<p><strong>Q: 为什么需要"屏幕使用时间"权限？</strong><br>
GooseNight 使用 Apple 的 Screen Time API 在睡觉时间后对您选择的 APP 显示答题提醒。没有该权限，应用无法正常工作。</p>

<p><strong>Q: 我的数据会被上传吗？</strong><br>
不会。所有数据都存储在您的设备本地，我们没有任何服务器。</p>

<p><strong>Q: 如何停止监控？</strong><br>
打开 GooseNight，在首页点击"停止监控"即可。</p>
