    <style>
        :root {
            --night: #0b0e1a;
            --amber: #e8a830;
            --cream: #e8e0d0;
            --cream-dim: #9e978a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans SC", -apple-system, sans-serif;
            background: var(--night);
            color: var(--cream);
            line-height: 1.85;
            padding: clamp(2rem, 6vw, 5rem);
            max-width: 640px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }
        a.back {
            display: inline-block;
            margin-bottom: 2.5rem;
            color: var(--cream-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        a.back:hover { color: var(--cream); }
        h1 {
            font-family: "Noto Serif SC", serif;
            font-weight: 900;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: var(--cream);
            margin-bottom: 2rem;
        }
        h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--amber);
            margin-top: 2.4rem;
            margin-bottom: 0.8rem;
        }
        p {
            color: rgba(232, 224, 208, 0.65);
            font-size: 0.92rem;
            font-weight: 300;
            margin-bottom: 0.7rem;
        }
        strong { font-weight: 700; color: var(--cream); }
        a { color: var(--amber); }
        .qa { margin-bottom: 1.6rem; }
        .qa p:first-child { color: var(--cream); font-weight: 400; }
        .contact {
            margin-top: 2rem;
            padding: 1.4rem 1.6rem;
            border: 1px solid rgba(232, 224, 208, 0.08);
            border-radius: 6px;
        }
    </style>
</head>

<h1>支持与帮助</h1>

<h2>常见问题</h2>

<div class="qa">
    <p><strong>Q: 为什么需要"屏幕使用时间"权限？</strong></p>
    <p>GooseNight 使用 Apple 的 Screen Time API 在睡觉时间后对您选择的 APP 显示答题提醒。没有该权限，应用无法正常工作。</p>
</div>

<div class="qa">
    <p><strong>Q: 我的数据会被上传吗？</strong></p>
    <p>不会。所有数据都存储在您的设备本地，我们没有任何服务器。</p>
</div>

<div class="qa">
    <p><strong>Q: 如何停止监控？</strong></p>
    <p>打开 GooseNight，在首页点击"停止监控"即可。</p>
</div>
