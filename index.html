<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GooseNight - 一只会催你睡觉的鹅</title>
    <meta name="description" content="GooseNight — 到点不睡？答题。答错？关APP。一只会催你睡觉的鹅，即将上线。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night: #0b0e1a;
            --night-mid: #131729;
            --ink: #1a1f38;
            --amber: #e8a830;
            --amber-dim: #c4882a;
            --amber-glow: #f5c24c;
            --cream: #e8e0d0;
            --cream-dim: #9e978a;
            --red: #c43a2a;
            --red-deep: #8c2020;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: "Noto Sans SC", -apple-system, sans-serif;
            background: var(--night);
            color: var(--cream);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SKY --- */
        canvas#stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .moon {
            position: fixed;
            top: 6vh; right: 8vw;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--amber-glow), var(--amber));
            box-shadow: 0 0 80px rgba(232, 168, 48, 0.3);
            z-index: 0;
            opacity: 0;
            animation: moonrise 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        @keyframes moonrise {
            from { opacity: 0; transform: translateY(30px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- HERO --- */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: clamp(2rem, 4vw, 4rem);
            padding: clamp(2rem, 6vw, 5rem);
            max-width: 960px;
            margin: 0 auto;
        }

        .hero-text {
            display: flex;
            flex-direction: column;
        }

        .headline {
            font-family: "Noto Serif SC", serif;
            font-weight: 900;
            font-size: clamp(2.2rem, 6vw, 4rem);
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: var(--cream);
            margin-bottom: clamp(0.6rem, 2vw, 1rem);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .headline em {
            font-style: normal;
            color: var(--amber);
        }

        .sub {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            font-weight: 300;
            line-height: 1.75;
            color: var(--cream-dim);
            margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .traits {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.4rem;
            margin-bottom: clamp(2rem, 5vw, 3rem);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .trait {
            font-size: 0.85rem;
            color: var(--cream-dim);
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .trait::before {
            content: "";
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--amber);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.4rem;
            border: 1px solid rgba(232, 168, 48, 0.3);
            border-radius: 6px;
            color: var(--amber);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            background: rgba(232, 168, 48, 0.06);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
            transition: background 0.3s;
        }

        .badge:hover { background: rgba(232, 168, 48, 0.12); }

        .badge svg { width: 16px; height: 16px; fill: currentColor; }

        /* Hero goose image */
        .hero-goose {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        .hero-goose img {
            width: clamp(200px, 28vw, 320px);
            height: auto;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- ESCALATION SECTION --- */
        .section {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 clamp(2rem, 6vw, 5rem) clamp(4rem, 10vw, 8rem);
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--cream-dim);
            margin-bottom: 2rem;
        }

        /* Anger levels */
        .anger-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(0.5rem, 1.5vw, 1rem);
        }

        .anger-item {
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .anger-item:nth-child(1) { animation-delay: 0.2s; }
        .anger-item:nth-child(2) { animation-delay: 0.35s; }
        .anger-item:nth-child(3) { animation-delay: 0.5s; }
        .anger-item:nth-child(4) { animation-delay: 0.65s; }
        .anger-item:nth-child(5) { animation-delay: 0.8s; }

        .anger-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 16px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
        }

        .anger-item:hover .anger-img {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .anger-caption {
            margin-top: 0.6rem;
            font-size: clamp(0.65rem, 1.4vw, 0.8rem);
            font-weight: 400;
            color: var(--cream-dim);
            line-height: 1.4;
        }

        .anger-bar {
            margin-top: 0.4rem;
            height: 3px;
            border-radius: 2px;
            opacity: 0.7;
        }

        .anger-item:nth-child(1) .anger-bar { background: #5a7a50; width: 20%; }
        .anger-item:nth-child(2) .anger-bar { background: #9a9234; width: 40%; }
        .anger-item:nth-child(3) .anger-bar { background: #c88a2a; width: 60%; }
        .anger-item:nth-child(4) .anger-bar { background: #c44a2a; width: 80%; }
        .anger-item:nth-child(5) .anger-bar { background: #9c2020; width: 100%; }

        /* --- FEATURES ROW --- */
        .features-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(1rem, 2vw, 1.5rem);
            margin-top: clamp(4rem, 8vw, 6rem);
        }

        .feat {
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        .feat:nth-child(2) { animation-delay: 1.15s; }
        .feat:nth-child(3) { animation-delay: 1.3s; }

        .feat img {
            width: clamp(80px, 14vw, 130px);
            height: auto;
            border-radius: 16px;
            margin-bottom: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .feat:hover img {
            transform: translateY(-4px);
        }

        .feat-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 0.3rem;
        }

        .feat-desc {
            font-size: 0.78rem;
            color: var(--cream-dim);
            font-weight: 300;
            line-height: 1.5;
        }

        /* --- FOOTER --- */
        .foot {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 3rem) clamp(2rem, 6vw, 5rem);
            border-top: 1px solid rgba(232, 224, 208, 0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 1.4rem;
            font-size: 0.75rem;
            color: rgba(232, 224, 208, 0.2);
        }

        .foot a {
            color: rgba(232, 224, 208, 0.3);
            text-decoration: none;
            transition: color 0.2s;
        }

        .foot a:hover { color: var(--cream-dim); }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-delay: 0ms !important;
                transition-duration: 0.01ms !important;
            }
            .moon { opacity: 1; }
        }

        /* --- MOBILE --- */
        @media (max-width: 680px) {
            .hero {
                grid-template-columns: 1fr;
                min-height: auto;
                padding-top: clamp(4rem, 12vw, 6rem);
                padding-bottom: 3rem;
            }
            .hero-goose { order: -1; }
            .hero-goose img {
                width: clamp(160px, 45vw, 220px);
                border-radius: 20px;
            }
            .moon { width: 40px; height: 40px; top: 3vh; right: 5vw; }
            .anger-row {
                grid-template-columns: repeat(5, 1fr);
                gap: 0.4rem;
            }
            .anger-caption { font-size: 0.55rem; }
            .features-row { grid-template-columns: 1fr; gap: 2rem; }
            .feat { display: flex; align-items: center; gap: 1rem; text-align: left; }
            .feat img { width: 72px; margin-bottom: 0; flex-shrink: 0; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="moon"></div>
<canvas id="stars"></canvas>

<!-- HERO -->
<div class="hero">
    <div class="hero-text">
        <h1 class="headline">一只会催你<br><em>睡觉</em>的鹅</h1>
        <p class="sub">你负责熬夜，鹅负责熬你。<br>越熬越凶，绝不心软。</p>
        <div>
            <span class="badge">
                <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                即将上线 App Store
            </span>
        </div>
    </div>
    <div class="hero-goose">
        <img src="img/GooseWelcome.png" alt="GooseNight 欢迎鹅" loading="eager">
    </div>
</div>

<!-- ESCALATION -->
<div class="section">
    <div class="section-label">越熬越凶 — 骚扰等级</div>
    <div class="anger-row">
        <div class="anger-item">
            <img class="anger-img" src="img/GooseAngry0.png" alt="轻微不满" loading="lazy">
            <div class="anger-caption">该休息了</div>
            <div class="anger-bar"></div>
        </div>
        <div class="anger-item">
            <img class="anger-img" src="img/GooseAngry1.png" alt="不耐烦" loading="lazy">
            <div class="anger-caption">快放下手机</div>
            <div class="anger-bar"></div>
        </div>
        <div class="anger-item">
            <img class="anger-img" src="img/GooseAngry2.png" alt="生气" loading="lazy">
            <div class="anger-caption">半小时了还没睡？</div>
            <div class="anger-bar"></div>
        </div>
        <div class="anger-item">
            <img class="anger-img" src="img/GooseAngry3.png" alt="很生气" loading="lazy">
            <div class="anger-caption">明天会很难受</div>
            <div class="anger-bar"></div>
        </div>
        <div class="anger-item">
            <img class="anger-img" src="img/GooseAngry4.png" alt="暴怒" loading="lazy">
            <div class="anger-caption">你真不打算睡了？</div>
            <div class="anger-bar"></div>
        </div>
    </div>

    <!-- Features -->
    <div class="features-row">
        <div class="feat">
            <img src="img/GooseShower.png" alt="洗漱提醒" loading="lazy">
            <div>
                <div class="feat-title">洗漱提醒</div>
                <div class="feat-desc">睡前一小时提醒你去洗澡</div>
            </div>
        </div>
        <div class="feat">
            <img src="img/GooseSleepy.png" alt="答题挑战" loading="lazy">
            <div>
                <div class="feat-title">答题挑战</div>
                <div class="feat-desc">答对继续刷，答错直接关 APP</div>
            </div>
        </div>
        <div class="feat">
            <img src="img/GooseSleep.png" alt="安心入睡" loading="lazy">
            <div>
                <div class="feat-title">安心入睡</div>
                <div class="feat-desc">灵动岛倒计时，守护你的睡眠</div>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="foot">
    <span>&copy; 2026 GooseNight</span>
    <a href="privacy.html">隐私政策</a>
    <a href="support.html">支持</a>
    <span>mucous.anklets.6x@icloud.com</span>
</div>

<script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({ length: 50 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.1 + 0.3,
            phase: Math.random() * Math.PI * 2,
            speed: 0.3 + Math.random() * 0.6
        }));
    }

    function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
            const a = 0.12 + 0.3 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed + s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(232, 224, 208, ${a})`;
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);

    // Intersection observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.style.animationPlayState = 'running';
                observer.unobserve(e.target);
            }
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.anger-item, .feat').forEach(el => {
        el.style.animationPlayState = 'paused';
        observer.observe(el);
    });
</script>

</body>
</html>
